<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>X Search Deck</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg:#000; --s1:#16181c; --s2:#1e2024; --border:#2f3336;
  --text:#e7e9ea; --muted:#71767b; --blue:#1d9bf0;
  --green:#00ba7c; --red:#f4212e; --amber:#ffd400;
}
html,body { height:100%; overflow:hidden; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); display:flex; flex-direction:column; }

/* Topbar */
#topbar { display:flex; align-items:center; gap:10px; padding:7px 14px; background:rgba(0,0,0,.92); border-bottom:.5px solid var(--border); flex-shrink:0; z-index:100; }
.logo { font-size:15px; font-weight:800; }
.logo em { font-style:normal; color:var(--blue); }
#conn-dot { width:7px; height:7px; border-radius:50%; background:#444; transition:background .3s; flex-shrink:0; }
#conn-dot.on  { background:var(--green); }
#conn-dot.err { background:var(--red); }
#conn-dot.spin { background:var(--amber); animation:blink 1s infinite; }
#conn-label { font-size:11px; color:var(--muted); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.tbr { margin-left:auto; display:flex; gap:8px; align-items:center; }
select.tb-sel, button.tb-btn { background:none; border:.5px solid var(--border); border-radius:20px; color:var(--muted); padding:4px 12px; font-size:11px; cursor:pointer; outline:none; transition:border-color .15s,color .15s; }
select.tb-sel:hover, button.tb-btn:hover { border-color:var(--blue); color:var(--blue); }
button.tb-primary { background:var(--blue); border:none; border-radius:20px; color:#fff; padding:5px 14px; font-size:11px; font-weight:700; cursor:pointer; transition:opacity .15s; }
button.tb-primary:hover { opacity:.88; }

/* Grid */
#grid { display:flex; flex:1; overflow:hidden; }
.col { flex:1; min-width:0; display:flex; flex-direction:column; border-right:.5px solid var(--border); }
.col:last-child { border-right:none; }

/* Col head */
.col-head { background:var(--s1); border-bottom:.5px solid var(--border); padding:7px 8px 6px; display:flex; flex-direction:column; gap:5px; flex-shrink:0; }
.ch-top { display:flex; align-items:flex-start; gap:5px; }
.col-n { font-size:10px; color:#444; font-weight:800; min-width:14px; padding-top:5px; cursor:grab; user-select:none; }
.col.dragging { opacity:.58; }
.col.drop-left { box-shadow:inset 2px 0 0 var(--blue); }
.col.drop-right { box-shadow:inset -2px 0 0 var(--blue); }
.col-head textarea { flex:1; min-height:48px; max-height:90px; resize:none; overflow:auto; background:var(--bg); border:.5px solid var(--border); border-radius:7px; color:var(--text); padding:5px 8px; font-size:11px; line-height:1.5; font-family:"SF Mono","Cascadia Code","Consolas",monospace; outline:none; transition:border-color .15s; }
.col-head textarea:focus { border-color:var(--blue); }
.col-head textarea::placeholder { color:#333; }
.ch-bot { display:flex; align-items:center; gap:5px; }
select.sort-sel { background:var(--bg); border:.5px solid var(--border); border-radius:6px; color:var(--muted); padding:3px 7px; font-size:10px; outline:none; cursor:pointer; flex-shrink:0; }
.col-meta { flex:1; font-size:10px; color:#3a3f44; white-space:nowrap; overflow:hidden; }
.col-meta span { color:var(--muted); }
.col-filters { display:grid; grid-template-columns:1fr 1fr auto; gap:5px; align-items:center; }
.col-filters input[type="date"], .col-tools input, .col-tools select { min-width:0; background:var(--bg); border:.5px solid var(--border); border-radius:6px; color:var(--muted); padding:3px 5px; font-size:10px; outline:none; color-scheme:dark; }
.col-tools { display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr) auto auto; gap:5px; align-items:center; }
.tpl-save { background:none; border:.5px solid var(--border); border-radius:6px; color:var(--muted); height:23px; min-width:25px; cursor:pointer; font-size:11px; }
.tpl-save:hover { color:var(--blue); border-color:var(--blue); }
.rt-toggle { display:flex; align-items:center; gap:4px; color:var(--muted); font-size:10px; white-space:nowrap; }
.rt-toggle input { accent-color:var(--blue); }
.live-toggle input { accent-color:var(--red); }
.sdot { width:5px; height:5px; border-radius:50%; background:#2a2a2a; flex-shrink:0; transition:background .3s; }
.sdot.loading { background:var(--blue); animation:blink .8s infinite; }
.sdot.ok      { background:var(--green); }
.sdot.error   { background:var(--red); }
.rbtn { background:none; border:none; color:#3a3f44; cursor:pointer; font-size:13px; padding:1px 3px; transition:color .15s; flex-shrink:0; }
.rbtn:hover { color:var(--blue); }

/* Col body */
.col-body { flex:1; overflow-y:auto; overflow-x:hidden; background:var(--bg); }
.col-body::-webkit-scrollbar { width:2px; }
.col-body::-webkit-scrollbar-thumb { background:#222; border-radius:2px; }
.col-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:10px; padding:24px; color:#2a2a2a; font-size:12px; text-align:center; }
.col-empty svg { opacity:.12; }
.col-error { margin:12px 10px; padding:10px 12px; background:rgba(244,33,46,.06); border:.5px solid rgba(244,33,46,.2); border-radius:8px; font-size:11px; color:#9a3535; line-height:1.5; }

/* Tweet */
.tweet { padding:10px 12px 9px; border-bottom:.5px solid #16181c; cursor:pointer; transition:background .1s; animation:tIn .25s ease; }
.tweet:hover { background:rgba(255,255,255,.025); }
.tweet.new { animation:tNew .6s ease; }
@keyframes tIn  { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:none} }
@keyframes tNew { 0%{background:rgba(29,155,240,.18)} 100%{background:transparent} }
.tw-head { display:flex; align-items:flex-start; gap:8px; margin-bottom:6px; }
.tw-av { width:30px; height:30px; border-radius:50%; background:var(--s2); flex-shrink:0; object-fit:cover; }
.tw-av-ph { width:30px; height:30px; border-radius:50%; background:var(--s2); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--muted); }
.tw-author { flex:1; min-width:0; }
.tw-name { font-size:12px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3; }
.tw-handle { font-size:11px; color:var(--muted); line-height:1.3; }
.tw-time { font-size:10px; color:var(--muted); flex-shrink:0; padding-top:1px; }
.tw-time.live { color:var(--red); font-weight:800; }
.tw-text { font-size:12.5px; line-height:1.55; color:var(--text); margin-bottom:7px; word-break:break-word; }
.kw-hit { background:rgba(255,212,0,.22); color:#f5f5f5; border-radius:3px; padding:0 1px; }
.tw-media { display:grid; gap:4px; margin:8px 0 7px; border:.5px solid var(--border); border-radius:8px; overflow:hidden; background:var(--s1); }
.tw-media.count-2, .tw-media.count-3, .tw-media.count-4 { grid-template-columns:repeat(2,minmax(0,1fr)); }
.tw-media-item { position:relative; min-height:86px; background:var(--s2); overflow:hidden; }
.tw-media img { width:100%; height:100%; min-height:86px; max-height:220px; object-fit:cover; display:block; }
.media-badge { position:absolute; left:6px; bottom:6px; background:rgba(0,0,0,.72); color:#fff; border:.5px solid rgba(255,255,255,.18); border-radius:12px; padding:2px 7px; font-size:10px; font-weight:800; }
.tw-metrics { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.tw-m { display:flex; align-items:center; gap:3px; font-size:11px; color:#555; }

/* Column name */
.col-name-wrap { position:relative; display:flex; align-items:center; justify-content:center; padding:4px 8px 2px; }
.col-name { font-size:11px; font-weight:700; color:var(--muted); text-align:center; background:none; border:none; border-bottom:.5px solid transparent; outline:none; cursor:text; width:100%; transition:border-color .15s,color .15s; }
.col-name:focus { border-bottom-color:var(--blue); color:var(--text); }
.col-badge { position:absolute; top:2px; right:4px; background:var(--blue); color:#fff; font-size:10px; font-weight:700; padding:1px 5px; border-radius:10px; pointer-events:none; display:none; }
.col-badge.show { display:inline-block; }

/* Overlay */
#overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:999; align-items:center; justify-content:center; }
#overlay.show { display:flex; }
.ov-box { background:var(--s1); border:.5px solid var(--border); border-radius:16px; padding:32px 36px; max-width:480px; text-align:center; }
.ov-box h2 { font-size:18px; margin-bottom:10px; }
.ov-box p  { font-size:13px; color:var(--muted); line-height:1.7; margin-bottom:14px; }
.ov-box pre { background:var(--bg); border:.5px solid var(--border); border-radius:8px; padding:10px 14px; text-align:left; font-size:12px; color:var(--blue); line-height:1.8; margin-bottom:16px; overflow-x:auto; }
.ov-box button { background:var(--blue); border:none; border-radius:20px; color:#fff; padding:9px 24px; font-size:13px; font-weight:700; cursor:pointer; }

/* Alert config modal */
#alert-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.82); z-index:1000; align-items:center; justify-content:center; padding:18px; }
#alert-modal.show { display:flex; }
.modal-box { width:min(760px, 100%); max-height:92vh; overflow:auto; background:var(--s1); border:.5px solid var(--border); border-radius:12px; padding:18px; box-shadow:0 18px 50px rgba(0,0,0,.45); }
.modal-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; }
.modal-head h2 { font-size:16px; }
.modal-close { background:none; border:.5px solid var(--border); color:var(--muted); border-radius:50%; width:28px; height:28px; cursor:pointer; }
.alert-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
.field { display:flex; flex-direction:column; gap:5px; }
.field.full { grid-column:1 / -1; }
.field label { color:var(--muted); font-size:11px; font-weight:700; }
.field input, .field textarea { background:var(--bg); border:.5px solid var(--border); border-radius:7px; color:var(--text); padding:8px 9px; font-size:12px; outline:none; }
.field textarea { min-height:64px; resize:vertical; }
.windows { grid-column:1 / -1; display:flex; flex-direction:column; gap:8px; }
.window-row { display:grid; grid-template-columns:1.2fr 1.4fr .7fr .7fr auto; gap:7px; align-items:center; }
.window-row input { background:var(--bg); border:.5px solid var(--border); border-radius:7px; color:var(--text); padding:7px 8px; font-size:12px; min-width:0; color-scheme:dark; }
.window-row label { display:flex; align-items:center; justify-content:center; gap:4px; color:var(--muted); font-size:11px; }
.modal-actions { display:flex; justify-content:flex-end; align-items:center; gap:8px; margin-top:14px; }
.modal-status { margin-right:auto; color:var(--muted); font-size:11px; }
@media (max-width: 720px) {
  .alert-grid, .window-row { grid-template-columns:1fr; }
  .field.full, .windows { grid-column:auto; }
}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo"><em>𝕏</em> Search Deck</div>
  <div id="conn-dot" class="err"></div>
  <div id="conn-label">conectando...</div>
  <div class="tbr">
    <select class="tb-sel" id="cols-sel" onchange="setColumns(+this.value)">
      <option value="2">2 colunas</option>
      <option value="3">3 colunas</option>
      <option value="4">4 colunas</option>
      <option value="5">5 colunas</option>
      <option value="6" selected>6 colunas</option>
    </select>
    <button class="tb-btn" onclick="subscribeAll()">↺ Atualizar</button>
    <button class="tb-btn" onclick="openAlertModal()">Alertas</button>
    <button class="tb-primary" onclick="subscribeAll()">▶ Iniciar busca</button>
  </div>
</div>

<div id="grid"></div>

<div id="overlay">
  <div class="ov-box">
    <h2>Servidor desconectado</h2>
    <p>O backend no Render pode estar inicializando<br>(cold start ~30s) ou offline.</p>
    <pre id="ws-url-display">Aguardando...</pre>
    <p style="font-size:12px">Se o erro persistir, verifique se o serviço está ativo<br>no painel do Render e se X_COOKIES_JSON está configurado.</p>
    <button onclick="retryConnect()">↺ Tentar reconectar</button>
  </div>
</div>

<div id="alert-modal">
  <div class="modal-box">
    <div class="modal-head">
      <h2>Alertas por e-mail</h2>
      <button class="modal-close" onclick="closeAlertModal()" title="Fechar">×</button>
    </div>
    <div class="alert-grid">
      <div class="field full">
        <label for="alert-enabled">Ativo</label>
        <label class="rt-toggle" style="justify-content:flex-start"><input type="checkbox" id="alert-enabled"> Enviar alertas automáticos</label>
      </div>
      <div class="field full">
        <label for="alert-recipients">Destinatários</label>
        <textarea id="alert-recipients" placeholder="email@dominio.com, outro@dominio.com"></textarea>
      </div>
      <div class="field">
        <label for="alert-frequency">Frequência dentro da janela (min)</label>
        <input id="alert-frequency" type="number" min="1" max="240" value="15">
      </div>
      <div class="field">
        <label for="alert-threshold">Threshold de engajamento</label>
        <input id="alert-threshold" type="number" min="1" value="200">
      </div>
      <div class="field">
        <label for="alert-spike-replies">Spike: replies</label>
        <input id="alert-spike-replies" type="number" min="1" value="500">
      </div>
      <div class="field">
        <label for="alert-spike-minutes">Spike: janela (min)</label>
        <input id="alert-spike-minutes" type="number" min="1" value="10">
      </div>
      <div class="field">
        <label for="alert-preview">Preview antes do programa (min)</label>
        <input id="alert-preview" type="number" min="0" max="240" value="30">
      </div>
      <div class="field">
        <label for="alert-silence-minutes">Silêncio editorial (min)</label>
        <input id="alert-silence-minutes" type="number" min="1" max="240" value="30">
      </div>
      <div class="field">
        <label for="alert-silence-enabled">Alerta de silêncio</label>
        <label class="rt-toggle" style="justify-content:flex-start"><input type="checkbox" id="alert-silence-enabled"> Ativar</label>
      </div>
      <div class="field">
        <label for="alert-final-digest-enabled">Digest final</label>
        <label class="rt-toggle" style="justify-content:flex-start"><input type="checkbox" id="alert-final-digest-enabled"> Enviar ao fim da janela</label>
      </div>
      <div class="field">
        <label for="alert-deck-url">URL do deck</label>
        <input id="alert-deck-url" type="url" placeholder="https://...">
      </div>
      <div class="windows">
        <div class="field"><label>Janelas de envio</label></div>
        <div id="alert-windows"></div>
      </div>
    </div>
    <div class="modal-actions">
      <span class="modal-status" id="alert-status"></span>
      <button class="tb-btn" onclick="sendAlertPreview()">Enviar preview</button>
      <button class="tb-primary" onclick="saveAlertConfig()">Salvar alertas</button>
    </div>
  </div>
</div>

<script>
// ── Detecta URL do WebSocket automaticamente ──────────────
// Se abrindo pelo Render: wss://seu-app.onrender.com/ws
// Se local:               ws://localhost:8765/ws
function getWsUrl() {
  const loc = window.location;
  if (loc.hostname === 'localhost' || loc.hostname === '127.0.0.1') {
    return `ws://${loc.hostname}:${loc.port || 8765}/ws`;
  }
  const proto = loc.protocol === 'https:' ? 'wss:' : 'ws:';
  return `${proto}//${loc.host}/ws`;
}

const WS_URL = getWsUrl();

// ── Queries padrão ────────────────────────────────────────
const BASE = `(Flamengo OR Corinthians OR Mirassol OR "São Paulo" OR Palmeiras OR Vasco OR Grêmio OR Internacional OR Santos OR "Atlético Mineiro" OR Galo OR Cruzeiro OR Fluminense OR Botafogo OR Bahia OR Athletico OR Seleção OR CBF OR Neymar OR VAR OR "Árbitro de Vídeo" OR Polêmico OR Polêmica)
-from:zamenza -from:allanconta5 -from:renansantosmbl -from:carteiroreaca
-Lula -Filme -SBT -"Agente Secreto" -"Erika Hilton" -BBB26 -STF
lang:pt min_replies:200`;

const PRESETS = [
  { label:'Futebol · Alta repercussão', query:BASE, sort:'live' },
  { label:'Futebol · Mais relevantes',  query:BASE, sort:'top'  },
  { label:'Polêmicas · sem filtro', sort:'live', query:
`(Flamengo OR Corinthians OR Palmeiras OR Vasco OR Grêmio OR Fluminense OR Botafogo OR "São Paulo" OR Cruzeiro OR Bahia OR Athletico OR Santos OR Galo OR CBF)
(Polêmica OR Polêmico OR Absurdo OR Escândalo OR Suspenso OR Expulso OR VAR OR "Árbitro de Vídeo")
-from:zamenza -from:allanconta5 -Lula -STF -BBB26 lang:pt`},
  { label:'CBF · Seleção · Neymar', sort:'live', query:
`(CBF OR "Seleção Brasileira" OR Neymar OR Dorival OR "Copa do Mundo")
-Lula -STF -BBB26 lang:pt`},
  { label:'Copa do Brasil · Libertadores', sort:'live', query:
`("Copa do Brasil" OR Libertadores OR "Sul-Americana" OR CONMEBOL)
lang:pt`},
  { label:'Livre — edite aqui', sort:'live', query:'' },
];

// ── Estado ────────────────────────────────────────────────
let numCols = +(localStorage.getItem('xdeck_num_cols') || 6), ws = null, reconnTimer = null, reconnAttempts = 0;
let seenUrls = {}, colResults = {};
let alertConfig = null;
let colOrder = normalizeColOrder(readJson('xdeck_col_order', null));
let queryTemplates = loadQueryTemplates();

// ── Grid ──────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  colOrder = normalizeColOrder(colOrder);
  for (let i = 0; i < numCols; i++) {
    const colId = colOrder[i];
    const p = PRESETS[colId] || { label:`Coluna ${colId+1}`, query:'', sort:'live' };
    if (!seenUrls[i]) seenUrls[i] = new Set();
    const col = document.createElement('div');
    col.className = 'col'; col.id = `col-${i}`;
    col.dataset.pos = i;
    col.dataset.colId = colId;
    const savedName = loadColName(colId) || p.label || `Coluna ${i+1}`;
    col.innerHTML = `
      <div class="col-head">
        <div class="col-name-wrap">
          <input class="col-name" id="colname${i}" value="${esc(savedName)}" placeholder="Nome da coluna" maxlength="40">
          <span class="col-badge" id="badge${i}"></span>
        </div>
        <div class="ch-top">
          <span class="col-n" title="Arraste para reorganizar">${i+1}</span>
          <textarea id="q${i}" spellcheck="false" placeholder="Query...">${esc(loadColQuery(colId) ?? p.query)}</textarea>
        </div>
        <div class="ch-bot">
          <select class="sort-sel" id="sort${i}">
            <option value="live" ${(loadColSort(colId)||p.sort)==='live'?'selected':''}>Recentes</option>
            <option value="top"  ${(loadColSort(colId)||p.sort)==='top'?'selected':''}>Top</option>
          </select>
          <div class="col-meta" id="meta${i}">—</div>
          <div class="sdot" id="sdot${i}"></div>
          <button class="rbtn" onclick="refreshOne(${i})" title="Refresh">↺</button>
        </div>
        <div class="col-filters">
          <input type="date" id="from${i}" value="${esc(loadColDateFrom(colId) || '')}" title="Desde">
          <input type="date" id="to${i}" value="${esc(loadColDateTo(colId) || '')}" title="Até">
          <label class="rt-toggle" title="Excluir retweets"><input type="checkbox" id="nort${i}" ${loadColExcludeRt(colId) ? 'checked' : ''}> sem RT</label>
        </div>
        <div class="col-tools">
          <select id="tpl${i}" title="Aplicar template">${renderTemplateOptions()}</select>
          <input id="kw${i}" value="${esc(loadColKeywords(colId) || '')}" placeholder="keywords">
          <button class="tpl-save" onclick="saveTemplateFromColumn(${i})" title="Salvar template">★</button>
          <label class="rt-toggle live-toggle" title="Modo ao vivo"><input type="checkbox" id="live${i}" ${loadColLive(colId) ? 'checked' : ''}> ao vivo</label>
        </div>
      </div>
      <div class="col-body" id="body${i}">
        <div class="col-empty">${xSvg()}<div>Clique em <strong>▶ Iniciar busca</strong></div></div>
      </div>`;
    grid.appendChild(col);
    const qEl = document.getElementById(`q${i}`);
    qEl.addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'Enter') subscribeAll();
    });
    qEl.addEventListener('input', () => saveColQuery(colId, qEl.value));
    document.getElementById(`sort${i}`).addEventListener('change', function() { saveColSort(colId, this.value); });
    document.getElementById(`colname${i}`).addEventListener('input', function() { saveColName(colId, this.value); });
    document.getElementById(`from${i}`).addEventListener('change', function() { saveColDateFrom(colId, this.value); });
    document.getElementById(`to${i}`).addEventListener('change', function() { saveColDateTo(colId, this.value); });
    document.getElementById(`nort${i}`).addEventListener('change', function() { saveColExcludeRt(colId, this.checked); });
    document.getElementById(`kw${i}`).addEventListener('input', function() { saveColKeywords(colId, this.value); rerenderColumn(i); });
    document.getElementById(`live${i}`).addEventListener('change', function() { saveColLive(colId, this.checked); });
    document.getElementById(`tpl${i}`).addEventListener('change', function() { applyTemplateToColumn(i, this.value); });
    // Clear badge when column body is clicked
    document.getElementById(`body${i}`).addEventListener('click', () => clearBadge(i), { capture: true });
    bindColumnDrag(col, col.querySelector('.col-n'));
  }
}

function setColumns(n) {
  numCols = n;
  localStorage.setItem('xdeck_num_cols', String(n));
  colOrder = normalizeColOrder(colOrder);
  saveColOrder();
  buildGrid();
  subscribeAll();
}

// ── WebSocket ─────────────────────────────────────────────
function connect() {
  clearTimeout(reconnTimer);
  try { ws = new WebSocket(WS_URL); } catch { scheduleReconn(); return; }

  ws.onopen = () => {
    reconnAttempts = 0;
    setDot('on', 'conectado');
    document.getElementById('overlay').classList.remove('show');
  };
  ws.onmessage = e => {
    let d; try { d = JSON.parse(e.data); } catch { return; }
    if (d.type === 'results') handleResults(d);
    else if (d.type === 'status') handleStatus(d);
  };
  ws.onclose = () => { setDot('err','desconectado'); scheduleReconn(); };
  ws.onerror = () => ws.close();
}

function scheduleReconn() {
  reconnAttempts++;
  const delay = Math.min(3000 * reconnAttempts, 20000);
  setDot('spin', `reconectando (${reconnAttempts})...`);
  if (reconnAttempts >= 3) {
    document.getElementById('ws-url-display').textContent = WS_URL;
    document.getElementById('overlay').classList.add('show');
  }
  reconnTimer = setTimeout(connect, delay);
}

function retryConnect() {
  reconnAttempts = 0;
  document.getElementById('overlay').classList.remove('show');
  connect();
}

function setDot(cls, label) {
  const d = document.getElementById('conn-dot');
  d.className = cls;
  document.getElementById('conn-label').textContent = label;
}

// ── Subscriptions ─────────────────────────────────────────
function subscribeAll() {
  if (!ws || ws.readyState !== WebSocket.OPEN) { connect(); return; }
  const cols = [];
  for (let i = 0; i < numCols; i++) {
    cols.push({
      query: document.getElementById(`q${i}`)?.value || '',
      sort:  document.getElementById(`sort${i}`)?.value || 'live',
      name:  document.getElementById(`colname${i}`)?.value || `Coluna ${i+1}`,
      date_from: document.getElementById(`from${i}`)?.value || '',
      date_to: document.getElementById(`to${i}`)?.value || '',
      exclude_retweets: !!document.getElementById(`nort${i}`)?.checked,
      live_mode: !!document.getElementById(`live${i}`)?.checked,
    });
  }
  ws.send(JSON.stringify({ type:'subscribe', columns:cols }));
}

function refreshOne(idx) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  subscribeAll();
  ws.send(JSON.stringify({ type:'refresh_one', column:idx }));
}

// ── Handlers ──────────────────────────────────────────────
function handleStatus({ column:col, status, message }) {
  const dot = document.getElementById(`sdot${col}`);
  if (dot) dot.className = `sdot ${status}`;
  if (status === 'error' && message) {
    const body = document.getElementById(`body${col}`);
    if (body) {
      body.querySelector('.col-error')?.remove();
      const e = document.createElement('div');
      e.className = 'col-error';
      e.textContent = `Erro: ${message}`;
      body.prepend(e);
    }
  }
}

function handleResults({ column:col, tweets, updated, count }) {
  const meta = document.getElementById(`meta${col}`);
  if (meta) meta.innerHTML = `<span>${count} tweets</span> · ${updated}`;
  colResults[col] = tweets || [];
  renderColumnResults(col, tweets || []);
}

function renderColumnResults(col, tweets) {
  const body = document.getElementById(`body${col}`);
  if (!body) return;
  body.querySelectorAll('.col-error').forEach(e => e.remove());
  if (!tweets?.length) {
    body.innerHTML = `<div class="col-empty">${xSvg()}<div>Sem resultados</div></div>`;
    return;
  }
  const prev = seenUrls[col] || new Set();
  const frag = document.createDocumentFragment();
  let newCount = 0;
  tweets.forEach(t => {
    const isNew = !!(t.url && !prev.has(t.url));
    if (isNew && prev.size > 0) newCount++;
    frag.appendChild(renderTweet(t, isNew, col));
  });
  body.innerHTML = '';
  body.appendChild(frag);
  if (document.getElementById(`live${col}`)?.checked) body.scrollTop = 0;
  seenUrls[col] = new Set(tweets.map(t=>t.url).filter(Boolean));
  if (newCount > 0) showBadge(col, newCount);
}

function rerenderColumn(col) {
  if (colResults[col]) renderColumnResults(col, colResults[col]);
}

// ── Render tweet ──────────────────────────────────────────
function renderTweet(t, isNew, col) {
  const div = document.createElement('div');
  div.className = 'tweet' + (isNew ? ' new' : '');
  if (t.url) div.onclick = () => window.open(t.url, '_blank');
  const av = t.avatar
    ? `<img class="tw-av" src="${esc(t.avatar)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt=""><div class="tw-av-ph" style="display:none">${initials(t.author_name)}</div>`
    : `<div class="tw-av-ph">${initials(t.author_name)}</div>`;
  const metrics = [
    [iReply, t.replies], [iRT, t.retweets], [iLike, t.likes], [iViews, t.views]
  ].filter(([,v]) => v && v !== '0')
   .map(([ic,v]) => `<span class="tw-m">${ic}<span>${esc(v)}</span></span>`).join('');
  const live = !!document.getElementById(`live${col}`)?.checked;
  const textHtml = highlightText(t.text, getKeywordsForColumn(col));
  const media = renderMedia(t.media || []);
  div.innerHTML = `
    <div class="tw-head">
      ${av}
      <div class="tw-author">
        <div class="tw-name">${esc(t.author_name)}</div>
        <div class="tw-handle">${esc(t.author_handle)}</div>
      </div>
      <div class="tw-time${live ? ' live' : ''}">${live ? 'AO VIVO · ' : ''}${relTime(t.timestamp)}</div>
    </div>
    <div class="tw-text">${textHtml}</div>
    ${media}
    ${metrics ? `<div class="tw-metrics">${metrics}</div>` : ''}`;
  return div;
}

// ── Utils ─────────────────────────────────────────────────
function esc(s) { return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escHtml(s) { return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function escReg(s) { return (s||'').replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function initials(n) { return(n||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function relTime(iso) {
  if (!iso) return '';
  const d = new Date(iso); if (isNaN(d)) return '';
  const s = (Date.now()-d)/1000;
  if (s<60)    return `${Math.round(s)}s`;
  if (s<3600)  return `${Math.round(s/60)}min`;
  if (s<86400) return `${Math.round(s/3600)}h`;
  return `${Math.round(s/86400)}d`;
}
function splitTerms(raw) {
  return Array.from(new Set((raw || '')
    .split(/[\n,;|]+/)
    .map(t => t.trim())
    .filter(t => t.length >= 3)
    .slice(0, 12)));
}
function deriveKeywords(query) {
  const blocked = new Set(['and','or','lang','from','filter','min_replies','since','until','the','com','sem']);
  return Array.from(new Set((query || '')
    .replace(/"([^"]+)"/g, ' $1 ')
    .split(/[^A-Za-zÀ-ÿ0-9_]+/)
    .map(t => t.trim())
    .filter(t => t.length >= 4 && !blocked.has(t.toLowerCase()) && !/^\d+$/.test(t))
    .slice(0, 10)));
}
function getKeywordsForColumn(col) {
  const explicit = splitTerms(document.getElementById(`kw${col}`)?.value || '');
  if (explicit.length) return explicit;
  return deriveKeywords(document.getElementById(`q${col}`)?.value || '');
}
function highlightText(text, terms) {
  const raw = text || '';
  if (!raw) return '';
  const cleanTerms = (terms || []).filter(Boolean).sort((a,b) => b.length - a.length);
  if (!cleanTerms.length) return escHtml(raw);
  const rx = new RegExp(`(${cleanTerms.map(escReg).join('|')})`, 'gi');
  return raw.split(rx).map(part => {
    const hit = cleanTerms.some(t => t.toLowerCase() === part.toLowerCase());
    return hit ? `<mark class="kw-hit">${escHtml(part)}</mark>` : escHtml(part);
  }).join('');
}
function renderMedia(items) {
  const media = (items || []).filter(m => m && m.url).slice(0, 4);
  if (!media.length) return '';
  return `<div class="tw-media count-${media.length}" onclick="event.stopPropagation()">${media.map(m => `
    <a class="tw-media-item" href="${esc(m.url)}" target="_blank" rel="noopener noreferrer">
      <img src="${esc(m.url)}" loading="lazy" alt="">
      ${m.type && m.type !== 'photo' ? `<span class="media-badge">${esc(m.type.toUpperCase())}</span>` : ''}
    </a>`).join('')}</div>`;
}
function svgI(path) { return `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="${path}"/></svg>`; }
const iReply = svgI('M1.751 10c0-4.42 3.584-8 8.005-8h4.246C18.484 2 22 5.58 22 10c0 4.423-3.516 8.003-7.998 8.003h-.013l-4.262.002a8.44 8.44 0 0 1-3.024-.555l-3.49 1.093a.75.75 0 0 1-.917-.916l1.065-3.395A8.04 8.04 0 0 1 1.751 10Z');
const iRT    = svgI('M4.5 3.88l4.432 4.14-1.364 1.46L5.5 7.55V16c0 1.1.896 2 2 2H13v2H7.5c-2.209 0-4-1.79-4-4V7.55L1.432 9.48.068 8.02 4.5 3.88zM16.5 6H11V4h5.5c2.209 0 4 1.79 4 4v8.45l2.068-1.93 1.364 1.46-4.432 4.14-4.432-4.14 1.364-1.46 2.068 1.93V8c0-1.1-.896-2-2-2z');
const iLike  = svgI('M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91z');
const iViews = svgI('M8.75 21V3h2v18h-2zM18 21V8.5h2V21h-2zM4 21l.004-10h2L6 21H4zm9.248 0v-7h2v7h-2z');
function xSvg() { return `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.73-8.835L1.254 2.25H8.08l4.258 5.63 5.906-5.63zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>`; }

// ── localStorage helpers ──────────────────────────────────
function lsKey(col, field) { return `xdeck_col${col}_${field}`; }
function saveColQuery(col, v) { localStorage.setItem(lsKey(col,'query'), v); }
function saveColSort(col, v)  { localStorage.setItem(lsKey(col,'sort'),  v); }
function saveColName(col, v)  { localStorage.setItem(lsKey(col,'name'),  v); }
function saveColDateFrom(col, v) { localStorage.setItem(lsKey(col,'date_from'), v); }
function saveColDateTo(col, v)   { localStorage.setItem(lsKey(col,'date_to'), v); }
function saveColExcludeRt(col, v){ localStorage.setItem(lsKey(col,'exclude_rt'), v ? '1' : '0'); }
function saveColKeywords(col, v) { localStorage.setItem(lsKey(col,'keywords'), v); }
function saveColLive(col, v)     { localStorage.setItem(lsKey(col,'live'), v ? '1' : '0'); }
function loadColQuery(col)    { return localStorage.getItem(lsKey(col,'query')); }
function loadColSort(col)     { return localStorage.getItem(lsKey(col,'sort')); }
function loadColName(col)     { return localStorage.getItem(lsKey(col,'name')); }
function loadColDateFrom(col) { return localStorage.getItem(lsKey(col,'date_from')); }
function loadColDateTo(col)   { return localStorage.getItem(lsKey(col,'date_to')); }
function loadColExcludeRt(col){ return localStorage.getItem(lsKey(col,'exclude_rt')) === '1'; }
function loadColKeywords(col) { return localStorage.getItem(lsKey(col,'keywords')); }
function loadColLive(col)     { return localStorage.getItem(lsKey(col,'live')) === '1'; }

function readJson(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch {
    return fallback;
  }
}
function normalizeColOrder(order) {
  const base = Array.isArray(order) ? order.map(Number).filter(Number.isInteger) : [];
  const seen = new Set();
  const out = [];
  base.forEach(id => {
    if (id >= 0 && !seen.has(id)) { seen.add(id); out.push(id); }
  });
  for (let i = 0; out.length < numCols; i++) {
    if (!seen.has(i)) { seen.add(i); out.push(i); }
  }
  return out.slice(0, numCols);
}
function saveColOrder() {
  localStorage.setItem('xdeck_col_order', JSON.stringify(colOrder));
}
function bindColumnDrag(col, handle) {
  if (!handle) return;
  handle.draggable = true;
  handle.addEventListener('dragstart', e => {
    col.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', col.dataset.pos);
  });
  handle.addEventListener('dragend', () => {
    document.querySelectorAll('.col').forEach(c => c.classList.remove('dragging','drop-left','drop-right'));
  });
  col.addEventListener('dragover', e => {
    e.preventDefault();
    const rect = col.getBoundingClientRect();
    const after = e.clientX > rect.left + rect.width / 2;
    col.classList.toggle('drop-left', !after);
    col.classList.toggle('drop-right', after);
  });
  col.addEventListener('dragleave', () => col.classList.remove('drop-left','drop-right'));
  col.addEventListener('drop', e => {
    e.preventDefault();
    const from = +e.dataTransfer.getData('text/plain');
    const to = +col.dataset.pos;
    if (!Number.isInteger(from) || !Number.isInteger(to) || from === to) return;
    const rect = col.getBoundingClientRect();
    const insertAfter = e.clientX > rect.left + rect.width / 2;
    const moved = colOrder.splice(from, 1)[0];
    let target = to;
    if (from < to) target--;
    colOrder.splice(insertAfter ? target + 1 : target, 0, moved);
    colOrder = normalizeColOrder(colOrder);
    saveColOrder();
    seenUrls = {};
    colResults = {};
    buildGrid();
    subscribeAll();
  });
}
function loadQueryTemplates() {
  const saved = readJson('xdeck_query_templates', []);
  return Array.isArray(saved) ? saved.filter(t => t && t.name && typeof t.query === 'string') : [];
}
function saveQueryTemplates() {
  localStorage.setItem('xdeck_query_templates', JSON.stringify(queryTemplates.slice(0, 30)));
}
function renderTemplateOptions() {
  const opts = [`<option value="">Templates</option>`];
  PRESETS.forEach((p, idx) => opts.push(`<option value="preset:${idx}">${esc(p.label)}</option>`));
  queryTemplates.forEach((t, idx) => opts.push(`<option value="saved:${idx}">${esc(t.name)}</option>`));
  return opts.join('');
}
function getTemplate(ref) {
  const [kind, rawIdx] = (ref || '').split(':');
  const idx = +rawIdx;
  if (kind === 'preset') return PRESETS[idx];
  if (kind === 'saved') return queryTemplates[idx];
  return null;
}
function applyTemplateToColumn(col, ref) {
  const tpl = getTemplate(ref);
  const sel = document.getElementById(`tpl${col}`);
  if (sel) sel.value = '';
  if (!tpl) return;
  const q = document.getElementById(`q${col}`);
  const s = document.getElementById(`sort${col}`);
  const logicalId = colOrder[col];
  if (q) { q.value = tpl.query || ''; saveColQuery(logicalId, q.value); }
  if (s && tpl.sort) { s.value = tpl.sort; saveColSort(logicalId, s.value); }
}
function saveTemplateFromColumn(col) {
  const query = document.getElementById(`q${col}`)?.value || '';
  if (!query.trim()) return;
  const fallback = document.getElementById(`colname${col}`)?.value || `Template ${queryTemplates.length + 1}`;
  const name = prompt('Nome do template', fallback);
  if (!name) return;
  queryTemplates = queryTemplates.filter(t => t.name !== name.trim());
  queryTemplates.unshift({ name:name.trim(), query, sort:document.getElementById(`sort${col}`)?.value || 'live' });
  saveQueryTemplates();
  buildGrid();
}

// ── Alert config ─────────────────────────────────────────
async function openAlertModal() {
  document.getElementById('alert-modal').classList.add('show');
  await loadAlertConfig();
}
function closeAlertModal() {
  document.getElementById('alert-modal').classList.remove('show');
}
async function loadAlertConfig() {
  setAlertStatus('carregando...');
  try {
    const r = await fetch('/api/alerts/config');
    alertConfig = await r.json();
    fillAlertForm(alertConfig);
    setAlertStatus('');
  } catch {
    setAlertStatus('erro ao carregar configuração');
  }
}
function fillAlertForm(cfg) {
  document.getElementById('alert-enabled').checked = !!cfg.enabled;
  document.getElementById('alert-recipients').value = (cfg.recipients || []).join(', ');
  document.getElementById('alert-frequency').value = cfg.frequency_minutes || 15;
  document.getElementById('alert-threshold').value = cfg.engagement_threshold || 200;
  document.getElementById('alert-spike-replies').value = cfg.spike_replies || 500;
  document.getElementById('alert-spike-minutes').value = cfg.spike_minutes || 10;
  document.getElementById('alert-preview').value = cfg.preview_minutes ?? 30;
  document.getElementById('alert-silence-enabled').checked = !!cfg.silence_alert_enabled;
  document.getElementById('alert-silence-minutes').value = cfg.silence_minutes || 30;
  document.getElementById('alert-final-digest-enabled').checked = !!cfg.final_digest_enabled;
  document.getElementById('alert-deck-url').value = cfg.deck_url || location.origin;
  const holder = document.getElementById('alert-windows');
  holder.innerHTML = '';
  (cfg.windows || []).forEach((w, idx) => {
    const row = document.createElement('div');
    row.className = 'window-row';
    row.dataset.idx = idx;
    row.innerHTML = `
      <input data-k="label" value="${esc(w.label || '')}" placeholder="Programa">
      <input data-k="days" value="${esc((w.days || []).join(','))}" placeholder="Dias 0-6">
      <input data-k="start" type="time" value="${esc(w.start || '17:30')}">
      <input data-k="end" type="time" value="${esc(w.end || '19:00')}">
      <label><input data-k="enabled" type="checkbox" ${w.enabled !== false ? 'checked' : ''}> ativa</label>`;
    holder.appendChild(row);
  });
}
function readAlertForm() {
  const windows = Array.from(document.querySelectorAll('.window-row')).map((row, idx) => {
    const get = k => row.querySelector(`[data-k="${k}"]`);
    return {
      id: alertConfig?.windows?.[idx]?.id || `window-${idx + 1}`,
      label: get('label').value.trim() || `Janela ${idx + 1}`,
      days: get('days').value.split(',').map(x => +x.trim()).filter(n => Number.isInteger(n) && n >= 0 && n <= 6),
      start: get('start').value || '17:30',
      end: get('end').value || '19:00',
      enabled: get('enabled').checked,
    };
  });
  return {
    enabled: document.getElementById('alert-enabled').checked,
    recipients: document.getElementById('alert-recipients').value.split(/[,\n;]+/).map(x => x.trim()).filter(Boolean),
    frequency_minutes: +document.getElementById('alert-frequency').value || 15,
    engagement_threshold: +document.getElementById('alert-threshold').value || 200,
    spike_replies: +document.getElementById('alert-spike-replies').value || 500,
    spike_minutes: +document.getElementById('alert-spike-minutes').value || 10,
    preview_minutes: +document.getElementById('alert-preview').value || 0,
    silence_alert_enabled: document.getElementById('alert-silence-enabled').checked,
    silence_minutes: +document.getElementById('alert-silence-minutes').value || 30,
    final_digest_enabled: document.getElementById('alert-final-digest-enabled').checked,
    deck_url: document.getElementById('alert-deck-url').value.trim(),
    windows,
  };
}
async function saveAlertConfig() {
  setAlertStatus('salvando...');
  try {
    const r = await fetch('/api/alerts/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(readAlertForm()),
    });
    alertConfig = await r.json();
    fillAlertForm(alertConfig);
    setAlertStatus(r.ok ? 'configuração salva' : 'erro ao salvar');
  } catch {
    setAlertStatus('erro ao salvar');
  }
}
async function sendAlertPreview() {
  setAlertStatus('enviando preview...');
  await saveAlertConfig();
  try {
    const r = await fetch('/api/alerts/preview', { method:'POST', headers:{ 'Content-Type':'application/json' }, body:'{}' });
    const data = await r.json();
    setAlertStatus(data.message || (r.ok ? 'preview enviado' : 'preview não enviado'));
  } catch {
    setAlertStatus('erro ao enviar preview');
  }
}
function setAlertStatus(msg) {
  document.getElementById('alert-status').textContent = msg || '';
}

// ── Badge helpers ──────────────────────────────────────────
function showBadge(col, count) {
  const b = document.getElementById(`badge${col}`);
  if (!b) return;
  const cur = parseInt(b.textContent) || 0;
  b.textContent = cur + count;
  b.classList.add('show');
}
function clearBadge(col) {
  const b = document.getElementById(`badge${col}`);
  if (b) { b.textContent = ''; b.classList.remove('show'); }
}

const colsSel = document.getElementById('cols-sel');
if (colsSel) colsSel.value = String(numCols);
buildGrid();
connect();
