<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>X Search Deck</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg:#000; --s1:#16181c; --s2:#1e2024; --border:#2f3336;
  --text:#e7e9ea; --muted:#71767b; --blue:#1d9bf0;
  --green:#00ba7c; --red:#f4212e; --amber:#ffd400;
}
html,body { height:100%; overflow:hidden; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); display:flex; flex-direction:column; }

/* Topbar */
#topbar { display:flex; align-items:center; gap:10px; padding:7px 14px; background:rgba(0,0,0,.92); border-bottom:.5px solid var(--border); flex-shrink:0; z-index:100; }
.logo { font-size:15px; font-weight:800; }
.logo em { font-style:normal; color:var(--blue); }
#conn-dot { width:7px; height:7px; border-radius:50%; background:#444; transition:background .3s; flex-shrink:0; }
#conn-dot.on  { background:var(--green); }
#conn-dot.err { background:var(--red); }
#conn-dot.spin { background:var(--amber); animation:blink 1s infinite; }
#conn-label { font-size:11px; color:var(--muted); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.tbr { margin-left:auto; display:flex; gap:8px; align-items:center; }
select.tb-sel, button.tb-btn { background:none; border:.5px solid var(--border); border-radius:20px; color:var(--muted); padding:4px 12px; font-size:11px; cursor:pointer; outline:none; transition:border-color .15s,color .15s; }
select.tb-sel:hover, button.tb-btn:hover { border-color:var(--blue); color:var(--blue); }
button.tb-primary { background:var(--blue); border:none; border-radius:20px; color:#fff; padding:5px 14px; font-size:11px; font-weight:700; cursor:pointer; transition:opacity .15s; }
button.tb-primary:hover { opacity:.88; }

/* Grid */
#grid { display:flex; flex:1; overflow:hidden; }
.col { flex:1; min-width:0; display:flex; flex-direction:column; border-right:.5px solid var(--border); }
.col:last-child { border-right:none; }

/* Col head */
.col-head { background:var(--s1); border-bottom:.5px solid var(--border); padding:7px 8px 6px; display:flex; flex-direction:column; gap:5px; flex-shrink:0; }
.ch-top { display:flex; align-items:flex-start; gap:5px; }
.col-n { font-size:10px; color:#444; font-weight:800; min-width:14px; padding-top:5px; }
.col-head textarea { flex:1; min-height:48px; max-height:90px; resize:none; overflow:auto; background:var(--bg); border:.5px solid var(--border); border-radius:7px; color:var(--text); padding:5px 8px; font-size:11px; line-height:1.5; font-family:"SF Mono","Cascadia Code","Consolas",monospace; outline:none; transition:border-color .15s; }
.col-head textarea:focus { border-color:var(--blue); }
.col-head textarea::placeholder { color:#333; }
.ch-bot { display:flex; align-items:center; gap:5px; }
select.sort-sel { background:var(--bg); border:.5px solid var(--border); border-radius:6px; color:var(--muted); padding:3px 7px; font-size:10px; outline:none; cursor:pointer; flex-shrink:0; }
.col-meta { flex:1; font-size:10px; color:#3a3f44; white-space:nowrap; overflow:hidden; }
.col-meta span { color:var(--muted); }
.sdot { width:5px; height:5px; border-radius:50%; background:#2a2a2a; flex-shrink:0; transition:background .3s; }
.sdot.loading { background:var(--blue); animation:blink .8s infinite; }
.sdot.ok      { background:var(--green); }
.sdot.error   { background:var(--red); }
.rbtn { background:none; border:none; color:#3a3f44; cursor:pointer; font-size:13px; padding:1px 3px; transition:color .15s; flex-shrink:0; }
.rbtn:hover { color:var(--blue); }

/* Col body */
.col-body { flex:1; overflow-y:auto; overflow-x:hidden; background:var(--bg); }
.col-body::-webkit-scrollbar { width:2px; }
.col-body::-webkit-scrollbar-thumb { background:#222; border-radius:2px; }
.col-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:10px; padding:24px; color:#2a2a2a; font-size:12px; text-align:center; }
.col-empty svg { opacity:.12; }
.col-error { margin:12px 10px; padding:10px 12px; background:rgba(244,33,46,.06); border:.5px solid rgba(244,33,46,.2); border-radius:8px; font-size:11px; color:#9a3535; line-height:1.5; }

/* Tweet */
.tweet { padding:10px 12px 9px; border-bottom:.5px solid #16181c; cursor:pointer; transition:background .1s; animation:tIn .25s ease; }
.tweet:hover { background:rgba(255,255,255,.025); }
.tweet.new { animation:tNew .6s ease; }
@keyframes tIn  { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:none} }
@keyframes tNew { 0%{background:rgba(29,155,240,.18)} 100%{background:transparent} }
.tw-head { display:flex; align-items:flex-start; gap:8px; margin-bottom:6px; }
.tw-av { width:30px; height:30px; border-radius:50%; background:var(--s2); flex-shrink:0; object-fit:cover; }
.tw-av-ph { width:30px; height:30px; border-radius:50%; background:var(--s2); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--muted); }
.tw-author { flex:1; min-width:0; }
.tw-name { font-size:12px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3; }
.tw-handle { font-size:11px; color:var(--muted); line-height:1.3; }
.tw-time { font-size:10px; color:var(--muted); flex-shrink:0; padding-top:1px; }
.tw-text { font-size:12.5px; line-height:1.55; color:var(--text); margin-bottom:7px; word-break:break-word; }
.tw-metrics { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.tw-m { display:flex; align-items:center; gap:3px; font-size:11px; color:#555; }

/* Column name */
.col-name-wrap { position:relative; display:flex; align-items:center; justify-content:center; padding:4px 8px 2px; }
.col-name { font-size:11px; font-weight:700; color:var(--muted); text-align:center; background:none; border:none; border-bottom:.5px solid transparent; outline:none; cursor:text; width:100%; transition:border-color .15s,color .15s; }
.col-name:focus { border-bottom-color:var(--blue); color:var(--text); }
.col-badge { position:absolute; top:2px; right:4px; background:var(--blue); color:#fff; font-size:10px; font-weight:700; padding:1px 5px; border-radius:10px; pointer-events:none; display:none; }
.col-badge.show { display:inline-block; }

/* Overlay */
#overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:999; align-items:center; justify-content:center; }
#overlay.show { display:flex; }
.ov-box { background:var(--s1); border:.5px solid var(--border); border-radius:16px; padding:32px 36px; max-width:480px; text-align:center; }
.ov-box h2 { font-size:18px; margin-bottom:10px; }
.ov-box p  { font-size:13px; color:var(--muted); line-height:1.7; margin-bottom:14px; }
.ov-box pre { background:var(--bg); border:.5px solid var(--border); border-radius:8px; padding:10px 14px; text-align:left; font-size:12px; color:var(--blue); line-height:1.8; margin-bottom:16px; overflow-x:auto; }
.ov-box button { background:var(--blue); border:none; border-radius:20px; color:#fff; padding:9px 24px; font-size:13px; font-weight:700; cursor:pointer; }
</style>
</head>
<body>

<div id="topbar">
  <div class="logo"><em>𝕏</em> Search Deck</div>
  <div id="conn-dot" class="err"></div>
  <div id="conn-label">conectando...</div>
  <div class="tbr">
    <select class="tb-sel" id="cols-sel" onchange="setColumns(+this.value)">
      <option value="2">2 colunas</option>
      <option value="3">3 colunas</option>
      <option value="4">4 colunas</option>
      <option value="5">5 colunas</option>
      <option value="6" selected>6 colunas</option>
    </select>
    <button class="tb-btn" onclick="subscribeAll()">↺ Atualizar</button>
    <button class="tb-primary" onclick="subscribeAll()">▶ Iniciar busca</button>
  </div>
</div>

<div id="grid"></div>

<div id="overlay">
  <div class="ov-box">
    <h2>Servidor desconectado</h2>
    <p>O backend no Render pode estar inicializando<br>(cold start ~30s) ou offline.</p>
    <pre id="ws-url-display">Aguardando...</pre>
    <p style="font-size:12px">Se o erro persistir, verifique se o serviço está ativo<br>no painel do Render e se X_COOKIES_JSON está configurado.</p>
    <button onclick="retryConnect()">↺ Tentar reconectar</button>
  </div>
</div>

<script>
// ── Detecta URL do WebSocket automaticamente ──────────────
// Se abrindo pelo Render: wss://seu-app.onrender.com/ws
// Se local:               ws://localhost:8765/ws
function getWsUrl() {
  const loc = window.location;
  if (loc.hostname === 'localhost' || loc.hostname === '127.0.0.1') {
    return `ws://${loc.hostname}:${loc.port || 8765}/ws`;
  }
  const proto = loc.protocol === 'https:' ? 'wss:' : 'ws:';
  return `${proto}//${loc.host}/ws`;
}

const WS_URL = getWsUrl();

// ── Queries padrão ────────────────────────────────────────
const BASE = `(Flamengo OR Corinthians OR Mirassol OR "São Paulo" OR Palmeiras OR Vasco OR Grêmio OR Internacional OR Santos OR "Atlético Mineiro" OR Galo OR Cruzeiro OR Fluminense OR Botafogo OR Bahia OR Athletico OR Seleção OR CBF OR Neymar OR VAR OR "Árbitro de Vídeo" OR Polêmico OR Polêmica)
-from:zamenza -from:allanconta5 -from:renansantosmbl -from:carteiroreaca
-Lula -Filme -SBT -"Agente Secreto" -"Erika Hilton" -BBB26 -STF
lang:pt min_replies:200`;

const PRESETS = [
  { label:'Futebol · Alta repercussão', query:BASE, sort:'live' },
  { label:'Futebol · Mais relevantes',  query:BASE, sort:'top'  },
  { label:'Polêmicas · sem filtro', sort:'live', query:
`(Flamengo OR Corinthians OR Palmeiras OR Vasco OR Grêmio OR Fluminense OR Botafogo OR "São Paulo" OR Cruzeiro OR Bahia OR Athletico OR Santos OR Galo OR CBF)
(Polêmica OR Polêmico OR Absurdo OR Escândalo OR Suspenso OR Expulso OR VAR OR "Árbitro de Vídeo")
-from:zamenza -from:allanconta5 -Lula -STF -BBB26 lang:pt`},
  { label:'CBF · Seleção · Neymar', sort:'live', query:
`(CBF OR "Seleção Brasileira" OR Neymar OR Dorival OR "Copa do Mundo")
-Lula -STF -BBB26 lang:pt`},
  { label:'Copa do Brasil · Libertadores', sort:'live', query:
`("Copa do Brasil" OR Libertadores OR "Sul-Americana" OR CONMEBOL)
lang:pt`},
  { label:'Livre — edite aqui', sort:'live', query:'' },
];

// ── Estado ────────────────────────────────────────────────
let numCols = 6, ws = null, reconnTimer = null, reconnAttempts = 0;
let seenUrls = {}, colResults = {};

// ── Grid ──────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 0; i < numCols; i++) {
    const p = PRESETS[i] || { label:`Coluna ${i+1}`, query:'', sort:'live' };
    if (!seenUrls[i]) seenUrls[i] = new Set();
    const col = document.createElement('div');
    col.className = 'col'; col.id = `col-${i}`;
    const savedName = loadColName(i) || p.label || `Coluna ${i+1}`;
    col.innerHTML = `
      <div class="col-head">
        <div class="col-name-wrap">
          <input class="col-name" id="colname${i}" value="${esc(savedName)}" placeholder="Nome da coluna" maxlength="40">
          <span class="col-badge" id="badge${i}"></span>
        </div>
        <div class="ch-top">
          <span class="col-n">${i+1}</span>
          <textarea id="q${i}" spellcheck="false" placeholder="Query...">${esc(loadColQuery(i) ?? p.query)}</textarea>
        </div>
        <div class="ch-bot">
          <select class="sort-sel" id="sort${i}">
            <option value="live" ${(loadColSort(i)||p.sort)==='live'?'selected':''}>Recentes</option>
            <option value="top"  ${(loadColSort(i)||p.sort)==='top'?'selected':''}>Top</option>
          </select>
          <div class="col-meta" id="meta${i}">—</div>
          <div class="sdot" id="sdot${i}"></div>
          <button class="rbtn" onclick="refreshOne(${i})" title="Refresh">↺</button>
        </div>
      </div>
      <div class="col-body" id="body${i}">
        <div class="col-empty">${xSvg()}<div>Clique em <strong>▶ Iniciar busca</strong></div></div>
      </div>`;
    grid.appendChild(col);
    const qEl = document.getElementById(`q${i}`);
    qEl.addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'Enter') subscribeAll();
    });
    qEl.addEventListener('input', () => saveColQuery(i, qEl.value));
    document.getElementById(`sort${i}`).addEventListener('change', function() { saveColSort(i, this.value); });
    document.getElementById(`colname${i}`).addEventListener('input', function() { saveColName(i, this.value); });
    // Clear badge when column body is clicked
    document.getElementById(`body${i}`).addEventListener('click', () => clearBadge(i), { capture: true });
  }
}

function setColumns(n) { numCols = n; buildGrid(); subscribeAll(); }

// ── WebSocket ─────────────────────────────────────────────
function connect() {
  clearTimeout(reconnTimer);
  try { ws = new WebSocket(WS_URL); } catch { scheduleReconn(); return; }

  ws.onopen = () => {
    reconnAttempts = 0;
    setDot('on', 'conectado');
    document.getElementById('overlay').classList.remove('show');
  };
  ws.onmessage = e => {
    let d; try { d = JSON.parse(e.data); } catch { return; }
    if (d.type === 'results') handleResults(d);
    else if (d.type === 'status') handleStatus(d);
  };
  ws.onclose = () => { setDot('err','desconectado'); scheduleReconn(); };
  ws.onerror = () => ws.close();
}

function scheduleReconn() {
  reconnAttempts++;
  const delay = Math.min(3000 * reconnAttempts, 20000);
  setDot('spin', `reconectando (${reconnAttempts})...`);
  if (reconnAttempts >= 3) {
    document.getElementById('ws-url-display').textContent = WS_URL;
    document.getElementById('overlay').classList.add('show');
  }
  reconnTimer = setTimeout(connect, delay);
}

function retryConnect() {
  reconnAttempts = 0;
  document.getElementById('overlay').classList.remove('show');
  connect();
}

function setDot(cls, label) {
  const d = document.getElementById('conn-dot');
  d.className = cls;
  document.getElementById('conn-label').textContent = label;
}

// ── Subscriptions ─────────────────────────────────────────
function subscribeAll() {
  if (!ws || ws.readyState !== WebSocket.OPEN) { connect(); return; }
  const cols = [];
  for (let i = 0; i < numCols; i++) {
    cols.push({
      query: document.getElementById(`q${i}`)?.value || '',
      sort:  document.getElementById(`sort${i}`)?.value || 'live',
      name:  document.getElementById(`colname${i}`)?.value || `Coluna ${i+1}`,
    });
  }
  ws.send(JSON.stringify({ type:'subscribe', columns:cols }));
}

function refreshOne(idx) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  subscribeAll();
  ws.send(JSON.stringify({ type:'refresh_one', column:idx }));
}

// ── Handlers ──────────────────────────────────────────────
function handleStatus({ column:col, status, message }) {
  const dot = document.getElementById(`sdot${col}`);
  if (dot) dot.className = `sdot ${status}`;
  if (status === 'error' && message) {
    const body = document.getElementById(`body${col}`);
    if (body) {
      body.querySelector('.col-error')?.remove();
      const e = document.createElement('div');
      e.className = 'col-error';
      e.textContent = `Erro: ${message}`;
      body.prepend(e);
    }
  }
}

function handleResults({ column:col, tweets, updated, count }) {
  const meta = document.getElementById(`meta${col}`);
  if (meta) meta.innerHTML = `<span>${count} tweets</span> · ${updated}`;
  const body = document.getElementById(`body${col}`);
  if (!body) return;
  body.querySelectorAll('.col-error').forEach(e => e.remove());
  if (!tweets?.length) {
    body.innerHTML = `<div class="col-empty">${xSvg()}<div>Sem resultados</div></div>`;
    return;
  }
  const prev = seenUrls[col] || new Set();
  const frag = document.createDocumentFragment();
  let newCount = 0;
  tweets.forEach(t => {
    const isNew = !!(t.url && !prev.has(t.url));
    if (isNew && prev.size > 0) newCount++;
    frag.appendChild(renderTweet(t, isNew));
  });
  body.innerHTML = '';
  body.appendChild(frag);
  seenUrls[col] = new Set(tweets.map(t=>t.url).filter(Boolean));
  if (newCount > 0) showBadge(col, newCount);
}

// ── Render tweet ──────────────────────────────────────────
function renderTweet(t, isNew) {
  const div = document.createElement('div');
  div.className = 'tweet' + (isNew ? ' new' : '');
  if (t.url) div.onclick = () => window.open(t.url, '_blank');
  const av = t.avatar
    ? `<img class="tw-av" src="${esc(t.avatar)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt=""><div class="tw-av-ph" style="display:none">${initials(t.author_name)}</div>`
    : `<div class="tw-av-ph">${initials(t.author_name)}</div>`;
  const metrics = [
    [iReply, t.replies], [iRT, t.retweets], [iLike, t.likes], [iViews, t.views]
  ].filter(([,v]) => v && v !== '0')
   .map(([ic,v]) => `<span class="tw-m">${ic}<span>${esc(v)}</span></span>`).join('');
  div.innerHTML = `
    <div class="tw-head">
      ${av}
      <div class="tw-author">
        <div class="tw-name">${esc(t.author_name)}</div>
        <div class="tw-handle">${esc(t.author_handle)}</div>
      </div>
      <div class="tw-time">${relTime(t.timestamp)}</div>
    </div>
    <div class="tw-text">${escHtml(t.text)}</div>
    ${metrics ? `<div class="tw-metrics">${metrics}</div>` : ''}`;
  return div;
}

// ── Utils ─────────────────────────────────────────────────
function esc(s) { return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escHtml(s) { return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function initials(n) { return(n||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function relTime(iso) {
  if (!iso) return '';
  const d = new Date(iso); if (isNaN(d)) return '';
  const s = (Date.now()-d)/1000;
  if (s<60)    return `${Math.round(s)}s`;
  if (s<3600)  return `${Math.round(s/60)}min`;
  if (s<86400) return `${Math.round(s/3600)}h`;
  return `${Math.round(s/86400)}d`;
}
function svgI(path) { return `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="${path}"/></svg>`; }
const iReply = svgI('M1.751 10c0-4.42 3.584-8 8.005-8h4.246C18.484 2 22 5.58 22 10c0 4.423-3.516 8.003-7.998 8.003h-.013l-4.262.002a8.44 8.44 0 0 1-3.024-.555l-3.49 1.093a.75.75 0 0 1-.917-.916l1.065-3.395A8.04 8.04 0 0 1 1.751 10Z');
const iRT    = svgI('M4.5 3.88l4.432 4.14-1.364 1.46L5.5 7.55V16c0 1.1.896 2 2 2H13v2H7.5c-2.209 0-4-1.79-4-4V7.55L1.432 9.48.068 8.02 4.5 3.88zM16.5 6H11V4h5.5c2.209 0 4 1.79 4 4v8.45l2.068-1.93 1.364 1.46-4.432 4.14-4.432-4.14 1.364-1.46 2.068 1.93V8c0-1.1-.896-2-2-2z');
const iLike  = svgI('M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91z');
const iViews = svgI('M8.75 21V3h2v18h-2zM18 21V8.5h2V21h-2zM4 21l.004-10h2L6 21H4zm9.248 0v-7h2v7h-2z');
function xSvg() { return `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.741l7.73-8.835L1.254 2.25H8.08l4.258 5.63 5.906-5.63zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>`; }

// ── localStorage helpers ──────────────────────────────────
function lsKey(col, field) { return `xdeck_col${col}_${field}`; }
function saveColQuery(col, v) { localStorage.setItem(lsKey(col,'query'), v); }
function saveColSort(col, v)  { localStorage.setItem(lsKey(col,'sort'),  v); }
function saveColName(col, v)  { localStorage.setItem(lsKey(col,'name'),  v); }
function loadColQuery(col)    { return localStorage.getItem(lsKey(col,'query')); }
function loadColSort(col)     { return localStorage.getItem(lsKey(col,'sort')); }
function loadColName(col)     { return localStorage.getItem(lsKey(col,'name')); }

// ── Badge helpers ──────────────────────────────────────────
function showBadge(col, count) {
  const b = document.getElementById(`badge${col}`);
  if (!b) return;
  const cur = parseInt(b.textContent) || 0;
  b.textContent = cur + count;
  b.classList.add('show');
}
function clearBadge(col) {
  const b = document.getElementById(`badge${col}`);
  if (b) { b.textContent = ''; b.classList.remove('show'); }
}

buildGrid();
connect();
</script>
</body>
</html>
